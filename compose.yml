services:
  postgres:
    image: postgres:18
    container_name: nslinkhub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nslinkhub
    ports:
      # nslinkhub = +4 in the stack-wide local port registry
      # (/home/ns/Person/stack/docs/local-port-registry.md)
      - '127.0.0.1:5436:5432'
    volumes:
      - nslinkhub_pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nslinkhub']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: nslinkhub-redis
    ports:
      - '127.0.0.1:6383:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nslinkhub_pgdata:
